name: Weekly ML Predictions

on:
  schedule:
    - cron: '0 6 * * 1'   # toda segunda-feira às 06:00 UTC
  workflow_dispatch:       # trigger manual pelo GitHub UI

jobs:
  run-predictions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        # torch/transformers (Sprint 4) são pesados e desnecessários aqui
        run: grep -vE '^(torch|transformers|torchaudio|torchvision)==' requirements.txt | pip install -r /dev/stdin

      - name: Check DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Secret DATABASE_URL não configurado. Adicione em Settings → Secrets → Actions."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build dataset, train model and generate predictions
        # --dataset: reconstrói training_dataset.parquet a partir do DB
        # --train:   treina GradientBoosting vs XGBoost e salva best_model.joblib
        # --predict: gera previsões BARATA/NEUTRA/CARA e salva em stock_predictions
        # Não usamos --scrape aqui pois requer Chrome/Selenium — scraping é
        # feito via workflow_dispatch separado ou manualmente.
        run: python pipeline.py --dataset --train --predict
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-${{ github.run_id }}
          path: |
            models/best_model.joblib
            models/label_encoder.joblib
            models/metadata.json
          retention-days: 30
